name: GBFS-Snapshot sammeln

on:
  schedule:
    - cron: "7 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: R einrichten
        uses: r-lib/actions/setup-r@v2

      - name: Abhängigkeiten installieren
        run: |
          Rscript -e 'install.packages(c("jsonlite","dplyr","tibble","purrr","readr","lubridate","tidyr"), repos="https://cloud.r-project.org")'

      - name: Alle 5 Minuten Snapshots sammeln
        run: |
          mkdir -p data

          for i in {1..70}
          do
            echo "Starte Snapshot $i von 70"
            Rscript collector.R

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git pull --rebase origin main || true
            git add data/*.csv
            git commit -m "Add GBFS snapshot $i" || echo "No changes to commit"
            git push || true

            echo "Warte 5 Minuten..."
            sleep 300
          done